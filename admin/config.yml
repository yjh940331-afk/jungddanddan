backend:
  name: github
  repo: yjh940331-afk/jungddanddan
  branch: main
  base_url: https://sveltia-cms-auth.yjh940331.workers.dev

# 업로드한 사진이 저장되는 폴더 (Git 기본 미디어 라이브러리 - 기존 사진 호환용)
media_folder: "images/uploads"
public_folder: "/images/uploads"

# 사진/영상 썸네일 저장소: Cloudflare R2 (대용량 원본 업로드용)
# - 비밀키(Secret Access Key)는 여기 넣지 않음. 관리자에서 사진 처음 올릴 때 1회 입력 → 브라우저에 안전 저장.
# - account_id 는 동일 Cloudflare 계정이라 그대로 사용.
# - ⚠️ bucket / public_url / access_key_id 는 무드바이 전용 R2 버킷·미디어도메인·전용 토큰을 새로 만들어 채워야 합니다.
media_libraries:
  cloudflare_r2:
    account_id: b8c01aa804c1c42982b17864b74e975b
    bucket: moodby-images
    access_key_id: bfe3a29f85d3a5bb139c0518c7c8788d
    public_url: https://media.moodby.kr
    prefix: uploads/

# 편집 화면 언어/문구
locale: "ko"
publish_mode: simple
site_url: https://moodby.kr
display_url: https://moodby.kr

collections:
  - name: "settings"
    label: "무드바이 관리"
    delete: false
    editor:
      preview: false
    files:
      - name: "site"
        label: "홈페이지 전체 편집"
        file: "content/settings.json"
        description: "문구·사회자 명단·가격·아카데미·Q&A를 관리합니다. 저장 후 우측 상단 Publish를 누르면 사이트에 반영됩니다."
        fields:
          # ---------- 기본 정보 ----------
          - { label: "브랜드명(로고)", name: "brand", widget: "string", default: "MOOD BY" }
          - { label: "푸터 회사 표기", name: "company", widget: "string", required: false }
          - label: "검색/공유 이미지(SEO · OG)"
            name: "seo"
            widget: "object"
            fields:
              - { label: "브라우저/공유 제목", name: "title", widget: "string", required: false, default: "무드바이 MOOD BY · 결혼식 사회자 에이전시" }
              - { label: "검색/공유 설명", name: "description", widget: "text", required: false }
              - { label: "대표 공유 이미지(OG)", name: "image", widget: "image", required: false, hint: "카카오톡·SNS 공유 시 보일 대표 이미지입니다. 권장 비율 1.91:1" }
          - { label: "사회자 이름 앞 접두어", name: "mcPrefix", widget: "string", required: false, default: "무드바이", hint: "예: '무드바이 다원'의 '무드바이' 부분" }
          - { label: "인스타그램 주소", name: "instagram", widget: "string", required: false, hint: "예: https://www.instagram.com/jung_ddanddan/" }
          - { label: "카카오톡 채널 주소", name: "kakao", widget: "string", required: false }

          # ---------- 메인(첫 화면) ----------
          - label: "메인 첫 화면(Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "배경 사진", name: "image", widget: "image", required: false }
              - label: "떠오르는 형용사(MOOD BY ___)"
                name: "words"
                widget: "list"
                field: { label: "단어", name: "word", widget: "string" }
              - { label: "태그라인", name: "tagline", widget: "string", default: "Color your wedding mood." }
              - { label: "보조 문구", name: "sub", widget: "string", required: false }

          # ---------- 홈 에디토리얼 ----------
          - label: "홈 에디토리얼 섹션"
            name: "home"
            widget: "object"
            fields:
              - { label: "작은 영문 라벨", name: "eyebrow", widget: "string", required: false, default: "MOOD BY SCENE" }
              - { label: "대표 문장", name: "title", widget: "string", required: false }
              - { label: "설명", name: "body", widget: "text", required: false }
              - label: "무드 팔레트 섹션"
                name: "palette"
                widget: "object"
                required: false
                fields:
                  - { label: "작은 영문 라벨", name: "eyebrow", widget: "string", required: false, default: "MOOD PALETTE" }
                  - { label: "제목", name: "title", widget: "string", required: false }
                  - { label: "설명", name: "body", widget: "text", required: false }
                  - { label: "대표 이미지", name: "image", widget: "image", required: false }
                  - { label: "하단 메모", name: "note", widget: "string", required: false }
              - label: "숫자 지표"
                name: "stats"
                widget: "list"
                required: false
                label_singular: "지표"
                summary: "{{fields.label}}"
                fields:
                  - { label: "숫자", name: "number", widget: "string", required: false, hint: "예: 5000" }
                  - { label: "단위/접미사", name: "suffix", widget: "string", required: false, hint: "예: 만+, 명+, 년+" }
                  - { label: "라벨", name: "label", widget: "string", required: false }
              - label: "홈 갤러리 카드"
                name: "gallery"
                widget: "list"
                required: false
                label_singular: "갤러리 카드"
                summary: "{{fields.title}}"
                fields:
                  - { label: "이미지", name: "image", widget: "image", required: false }
                  - { label: "작은 라벨", name: "label", widget: "string", required: false }
                  - { label: "제목", name: "title", widget: "string", required: false }
                  - { label: "설명", name: "text", widget: "string", required: false }
              - label: "흐르는 무드 단어"
                name: "marquee"
                widget: "list"
                required: false
                field: { label: "단어", name: "word", widget: "string" }

          # ---------- 소개(About) ----------
          - label: "소개(About)"
            name: "about"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string" }
              - { label: "소개 글", name: "body", widget: "text", hint: "줄바꿈으로 문단을 나눠 주세요." }
              - label: "이런 분께 적합"
                name: "fit"
                widget: "list"
                field: { label: "항목", name: "item", widget: "string" }

          # ---------- 대표 소개 ----------
          - label: "대표 소개"
            name: "ceo"
            widget: "object"
            fields:
              - { label: "이름/제목", name: "title", widget: "string", default: "대표 정다원" }
              - { label: "직함", name: "role", widget: "string", required: false }
              - { label: "프로필 사진", name: "image", widget: "image", required: false }
              - { label: "소개 글", name: "body", widget: "text", hint: "줄바꿈으로 문단을 나눠 주세요." }

          # ---------- 비전/미션/약속 ----------
          - label: "비전 · 미션 · 약속"
            name: "vision"
            widget: "object"
            fields:
              - label: "비전(VISION)"
                name: "vision"
                widget: "list"
                field: { label: "항목", name: "item", widget: "string" }
              - { label: "미션(MISSION)", name: "mission", widget: "text" }
              - label: "브랜드 약속(PROMISE)"
                name: "promises"
                widget: "list"
                field: { label: "항목", name: "item", widget: "string" }

          # ---------- Mood Crew ----------
          - label: "Mood Crew(왜 무드바이)"
            name: "crew"
            widget: "object"
            fields:
              - { label: "리드 문구", name: "lead", widget: "string", required: false }
              - label: "일하는 방식"
                name: "ways"
                widget: "list"
                label_singular: "항목"
                summary: "{{fields.title}}"
                fields:
                  - { label: "아이콘 글자", name: "icon", widget: "string", required: false, hint: "예: 01, 02, 03" }
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "text", widget: "string" }
              - label: "차별점"
                name: "diffs"
                widget: "list"
                label_singular: "항목"
                summary: "{{fields.title}}"
                fields:
                  - { label: "아이콘 글자", name: "icon", widget: "string", required: false }
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "text", widget: "string" }

          # ---------- 사회자 명단 ----------
          - label: "사회자 명단(MC)"
            name: "mcs"
            widget: "list"
            label_singular: "사회자"
            summary: "{{fields.name}}"
            hint: "사진/진행 영상은 비워두면 이니셜만 표시됩니다. 무드 키워드가 명단 위 필터로 자동 생성됩니다."
            fields:
              - { label: "이름", name: "name", widget: "string" }
              - { label: "이모지", name: "emoji", widget: "string", required: false, hint: "예: 🍊 🪽 🌳" }
              - { label: "고유 색상", name: "color", widget: "color", required: false, hint: "사회자 카드·키워드에 쓰이는 색 (비우면 자동 배정)" }
              - label: "무드 키워드"
                name: "keywords"
                widget: "list"
                field: { label: "키워드", name: "keyword", widget: "string" }
              - { label: "프로필 사진", name: "image", widget: "image", required: false }
              - { label: "진행 영상(유튜브 ID 또는 링크)", name: "youtube", widget: "string", required: false }
              - { label: "강점 한 줄", name: "strength", widget: "string", required: false }
              - { label: "추천 고객 유형", name: "recommend", widget: "string", required: false }
              - { label: "후기 한 줄", name: "review", widget: "string", required: false }

          # ---------- 진행 프로세스 ----------
          - label: "진행 프로세스"
            name: "process"
            widget: "list"
            label_singular: "단계"
            summary: "{{fields.title}}"
            fields:
              - { label: "단계 제목", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "string", required: false }

          # ---------- 비용 ----------
          - label: "비용(가격표)"
            name: "pricing"
            widget: "object"
            fields:
              - { label: "안내 문구", name: "note", widget: "string", required: false }
              - label: "등급별 가격"
                name: "tiers"
                widget: "list"
                label_singular: "등급"
                summary: "{{fields.name}}"
                fields:
                  - { label: "등급명", name: "name", widget: "string" }
                  - { label: "설명", name: "desc", widget: "string", required: false }
                  - { label: "1부 가격", name: "part1", widget: "string" }
                  - { label: "2부 가격", name: "part2", widget: "string" }

          # ---------- 아카데미(무드랩) ----------
          - label: "아카데미(무드랩)"
            name: "academy"
            widget: "object"
            fields:
              - { label: "제목", name: "title", widget: "string", default: "무드랩 MOOD LAB" }
              - { label: "부제", name: "sub", widget: "string", required: false }
              - { label: "소개 글", name: "body", widget: "text", hint: "줄바꿈으로 문단을 나눠 주세요." }
              - label: "이런 곳입니다"
                name: "fit"
                widget: "list"
                field: { label: "항목", name: "item", widget: "string" }
              - label: "사회자 성장 단계"
                name: "pipeline"
                widget: "list"
                field: { label: "단계", name: "step", widget: "string" }
              - label: "핵심 역량"
                name: "competencies"
                widget: "list"
                label_singular: "역량"
                summary: "{{fields.title}}"
                fields:
                  - { label: "아이콘 글자", name: "icon", widget: "string", required: false }
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "text", widget: "string" }
              - { label: "인재상", name: "talent", widget: "text", required: false }
              - label: "선발 기준"
                name: "selection"
                widget: "list"
                field: { label: "항목", name: "item", widget: "string" }
              - label: "문의 버튼"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "버튼 문구", name: "text", widget: "string", required: false }
                  - { label: "버튼 링크", name: "url", widget: "string", required: false }

          # ---------- Q&A ----------
          - label: "자주 묻는 질문(Q&A)"
            name: "faq"
            widget: "list"
            label_singular: "질문"
            summary: "{{fields.q}}"
            fields:
              - { label: "질문", name: "q", widget: "string" }
              - { label: "답변", name: "a", widget: "text" }

          # ---------- 문의 안내 ----------
          - label: "문의 안내"
            name: "booking"
            widget: "object"
            fields:
              - { label: "문의 안내 문구", name: "note", widget: "string", required: false }
